# ── Prompt Firewall — Model Configuration ────────────────────────────────────
# All values match the final trained notebook (v3).
# Edit here; never hardcode in src/.

model:
  hf_repo_id: "jiyajain23/prompt-firewall-model"   
  deberta_subdir: "deberta_best"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  transformer_model: "microsoft/deberta-v3-base"
  transformer_max_len: 256
  hf_revision: null            # Pinned Git commit SHA / revision for HuggingFace downloads (null = use latest)
  artifacts_manifest: "manifest.json"
artifacts:
  xgb_model: "xgb_model.json"
  scaler: "scaler.pkl"
  xgb_threshold: "xgb_threshold.pkl"
  ensemble_config: "ensemble_config.pkl"
  faiss_index: "zeroday.faiss"
  faiss_meta: "zeroday_meta.pkl"
  # TAXONOMY REMOVED: shap_explainer, taxonomy_clf, taxonomy_le no longer loaded.

ensemble:
  # Recalibrated weights from evaluation cell (BUG-3 FIX: normalized formula).
  # W_XGB + W_TRANSFORMER need not sum to 1.0 — normalized inside engine.
  # W_FAISS_DELTA is additive, not a weight.
  w_xgb: 0.05
  w_transformer: 0.95
  # BUG-1b FIX: additive delta on top of the normalized base score.
  w_faiss_delta: 0.10
  threshold: 0.915             # calibrated on val set (locked-in)
  target_fpr: 0.015            # design constraint documented here
  xgb_threshold: 0.79          # calibrated XGB-only threshold
  xgb_fast_high: 0.97          # skip transformer above this (was 0.92)
  xgb_fast_low: 0.03           # skip transformer below this (was 0.08)

faiss:
  sim_threshold: 0.82          # hard match
  soft_threshold: 0.70         # soft match (score * 0.5 bonus)

features:
  emb_dim: 384
  n_hand_crafted: 12           # must match extract_features() exactly
  total_dim: 396

session:
  max_turns: 20
  context_window_turns: 5      # BUG-6 FIX: recent turns fed to ML models
  window_size: 3
  window_stride: 1
  window_max_chars: 512
  escalation_window: 5
  escalation_threshold: 0.25
  escalation_boost: 0.25          
  persistence_min_hits: 2
  persistence_window: 6           
  persistence_boost: 0.15         
  escalation_peak_floor: 0.75
  cascade_certain_high: 0.92
  cascade_certain_low: 0.05    

  ttl_seconds: 3600
  max_sessions: 10000

api:
  host: "0.0.0.0"
  port: 8000
  workers: 2
  max_prompt_len: 32000
  rate_limit_per_minute: 120
  require_api_key: false       # Force authentication failure if FIREWALL_API_KEY is empty in prod
  redis_url: ""                # Redis connection URL for distributed rate limiting (empty = fallback to in-memory)
  cors_origins: "*"            # Allowed CORS origins, comma-separated (overridden by CORS_ORIGINS env var)
  log_dir: "/app/logs"
  public_health_details: false